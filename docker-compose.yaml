services:
  myreps:
    image: docker.io/vh82/myreps
    container_name: myreps
    restart: unless-stopped
    ports:
      - 8080:8080
    volumes:
      - ./settings/:/settings/
      
      # to utilize ffmpeg, you must have it installed on your machine and add these 2 volumes
      # make sure to change the path to where ffmpeg and ffprobe are located on your machine
      #- /usr/local/bin/ffmpeg:/home/linuxbrew/.linuxbrew/Cellar/ffmpeg/ffmpeg:ro
      #- /usr/local/bin/ffprobe:/home/linuxbrew/.linuxbrew/Cellar/ffmpeg/ffprobe:ro
      # you'll also need to add your machines drivers
      #- /usr/lib/x86_64-linux-gnu/dri:/usr/lib/x86_64-linux-gnu/dri:ro

    # for hardware accelleration with ffpmeg
    #devices:
    #  - /dev/dri:/dev/dri

    # Health check
    healthcheck:
      test: [ "CMD", "curl", "-v", "http://127.0.0.1:8080/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
